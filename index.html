<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI/UX Design Quiz - Complete</title>
    <style>
        /* BASE STYLES & RESET */
        :root {
            --primary-blue: #006aff;
            --success-green: #00a55f;
            --bg-gray: #f2f2f2;
            --white: #ffffff;
            --sidebar-blue: #e4f0fb;
            --active-blue: #bee0ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Inter", sans-serif; background: #e4f0fb; }

        .mac-book-container {
            background: var(--bg-gray);
            height: 832px;
            width: 1240px;
            margin: 50px auto;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: none; /* Controlled by JS */
        }

        /* HEADER */
        .frame-6 {
            background: var(--white);
            border-radius: 8px 8px 0px 0px;
            padding: 15px 23px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            align-self: stretch;
        }
        .logo { display: flex; font-size: 26px; letter-spacing: 0.17em; font-weight: 600; }
        .logo .blue { color: var(--primary-blue); }
        .logo .gray { color: #414141; }
        .nav { display: flex; gap: 17px; align-items: center; }
        .nav-item { color: #414141; font-size: 16px; cursor: pointer; }
        .user-avatar { background: #d9d9d9; border-radius: 50%; width: 31px; height: 31px; }

        /* QUIZ CONTENT AREA */
        .frame-38 {
            background: var(--white);
            padding: 20px 22px;
            display: flex;
            flex-direction: row;
            gap: 103px;
            height: 750px;
        }
        .quiz-main { width: 856px; display: flex; flex-direction: column; gap: 25px; }
        .ui-ux-title { font-size: 36px; font-weight: 600; margin-bottom: 20px; }
        
        .question-text { font-size: 20px; line-height: 1.5; margin-bottom: 40px; }
        .question-bold { font-weight: 700; }

        .options-list { display: flex; flex-direction: column; gap: 18px; }
        .option-row {
            background: var(--sidebar-blue);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
        }
        .option-row:hover { background: #d0e7ff; }
        .option-row.selected { background: var(--active-blue) !important; }
        .option-row.selected .circle { background: var(--primary-blue) !important; }
        .circle { background: var(--white); border-radius: 50%; width: 22px; height: 22px; flex-shrink: 0; }

        /* BUTTONS */
        .btn-next {
            background: var(--primary-blue);
            color: white;
            padding: 12px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            border: none;
            float: right;
            margin-top: 40px;
            display: none; /* Show only after answering */
        }

        /* SIDEBAR */
        .sidebar { width: 235px; display: flex; flex-direction: column; gap: 26px; }
        .score-box {
            background: var(--active-blue);
            border-radius: 8px;
            height: 97px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 500;
        }
        .q-progress { display: flex; flex-direction: column; gap: 11px; }
        .q-item {
            background: var(--sidebar-blue);
            padding: 10px 14px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            font-size: 20px;
            color: #b0b0b0;
        }
        .q-item.active { border: 2px solid var(--primary-blue); color: #414141; }
        .q-item.completed .dot { background: var(--success-green); }
        .dot { background: var(--white); border-radius: 50%; width: 22px; height: 22px; margin-right: 13px; }

        /* START & END SCREENS */
        #start-screen, #result-screen {
            background: var(--white);
            width: 491px;
            margin: 100px auto;
            padding: 50px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .big-btn {
            background: var(--primary-blue);
            color: white;
            padding: 16px;
            border-radius: 14px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        .icon-check { width: 64px; height: 64px; margin-bottom: 20px; }
    </style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen">
    <h2 style="color:var(--primary-blue); margin-bottom: 20px;">UX Quiz</h2>
    <h1 style="font-size: 32px; margin-bottom: 15px;">Test Your UX Thinking</h1>
    <p style="color: #6a7282; margin-bottom: 30px;">Quick design challenges to sharpen your skills</p>
    <button class="big-btn" onclick="startQuiz()">Start Quiz</button>
    <p style="color: #99a1af; font-size: 14px; margin-top: 15px;">Takes less than 2 minutes</p>
</div>

<!-- MAIN QUIZ INTERFACE -->
<div class="mac-book-container" id="quiz-container">
    <div class="frame-6">
        <div class="logo">
            <span class="blue">COG</span><span class="gray">NIT</span>
        </div>
        <div class="nav">
            <div class="nav-item">Home</div>
            <div class="nav-item">About</div>
            <div class="nav-item">Quiz</div>
            <div class="user-avatar"></div>
        </div>
    </div>

    <div class="frame-38">
        <div class="quiz-main">
            <h1 class="ui-ux-title">UI/UX Design Quiz</h1>
            <div id="question-area">
                <div class="question-text" id="q-text"></div>
                <div class="options-list" id="q-options"></div>
                <button class="btn-next" id="next-btn" onclick="nextQuestion()">Next</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="score-box">
                <span id="current-score">0</span><span>/5</span>
            </div>
            <div class="q-progress" id="sidebar-progress">
                <!-- Items generated by JS -->
            </div>
        </div>
    </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen" style="display: none;">
    <svg class="icon-check" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="#F0F9F4" stroke="#00a55f" />
        <path d="M8 12l3 3 5-5" stroke="#00a55f" fill="none" stroke-width="2"/>
    </svg>
    <h2 style="color:var(--primary-blue)">Quiz Completed</h2>
    <h1 style="font-size: 60px; margin: 20px 0;" id="final-score">0/5</h1>
    <p id="feedback-text" style="font-size: 18px; margin-bottom: 20px;"></p>
    <button class="big-btn" onclick="location.reload()">Retake Quiz</button>
</div>

<script>
    const questions = [
        {
            text: "A user has to remember multiple steps to complete a task, leading to confusion. Which approach helps?",
            options: [
                { text: "Add more instructions", correct: false },
                { text: "Reduce steps and show clear guidance", correct: true },
                { text: "Use smaller text", correct: false },
                { text: "Remove labels", correct: false }
            ]
        },
        {
            text: "A user struggles to find the 'Add to Cart' button because it blends in. What's the fix?",
            options: [
                { text: "Add animations", correct: false },
                { text: "Hide button until scroll", correct: false },
                { text: "Make it more prominent using color/size", correct: true },
                { text: "Add instructions", correct: false }
            ]
        },
        {
            text: "Users are unsure if a form submission was successful. What should a designer do?",
            options: [
                { text: "Do nothing", correct: false },
                { text: "Add success messages/loading indicators", correct: true },
                { text: "Redirect immediately", correct: false },
                { text: "Make button disappear", correct: false }
            ]
        },
        {
            text: "A website uses different styles for buttons across pages. Which principle is violated?",
            options: [
                { text: "Hierarchy", correct: false },
                { text: "Feedback", correct: false },
                { text: "Consistency", correct: true },
                { text: "Accessibility", correct: false }
            ]
        },
        {
            text: "A dashboard shows too much info at once. What is the best solution?",
            options: [
                { text: "Add more data", correct: false },
                { text: "Use visual hierarchy to highlight importance", correct: true },
                { text: "Use random colors", correct: false },
                { text: "Increase font size for everything", correct: false }
            ]
        }
    ];

    let currentStep = 0;
    let score = 0;
    let answered = false;

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        loadQuestion();
        updateSidebar();
    }

    function loadQuestion() {
        answered = false;
        const q = questions[currentStep];
        document.getElementById('q-text').innerHTML = `<span class="question-bold">Question ${currentStep + 1}:</span> ${q.text}`;
        
        const optionsHtml = q.options.map((opt, index) => `
            <div class="option-row" onclick="handleSelect(this, ${opt.correct})">
                <div class="circle"></div>
                <div class="option-text">${opt.text}</div>
            </div>
        `).join('');
        
        document.getElementById('q-options').innerHTML = optionsHtml;
        document.getElementById('next-btn').style.display = 'none';
    }

    function handleSelect(element, isCorrect) {
        if (answered) return;
        
        document.querySelectorAll('.option-row').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        
        if (isCorrect) score++;
        
        document.getElementById('current-score').innerText = score;
        document.getElementById('next-btn').style.display = 'block';
        answered = true;
    }

    function nextQuestion() {
        const items = document.querySelectorAll('.q-item');
        items[currentStep].classList.add('completed');
        
        currentStep++;
        if (currentStep < questions.length) {
            loadQuestion();
            updateSidebar();
        } else {
            showResults();
        }
    }

    function updateSidebar() {
        const sidebar = document.getElementById('sidebar-progress');
        sidebar.innerHTML = questions.map((_, i) => `
            <div class="q-item ${i === currentStep ? 'active' : ''} ${i < currentStep ? 'completed' : ''}">
                <div class="dot"></div>
                Question ${i + 1}
            </div>
        `).join('');
    }

    function showResults() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${score}/5`;
        
        const feedback = score >= 4 ? "Excellent! You have a strong grasp of UX." : 
                         score >= 2 ? "Good job! Keep practicing." : "Keep studying UX basics!";
        document.getElementById('feedback-text').innerText = feedback;
    }
</script>

</body>
</html>
